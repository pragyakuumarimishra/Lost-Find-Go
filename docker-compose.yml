version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  api:
    build: ./api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
      JWT_SECRET: change-me
      PORT: 4000
      NODE_ENV: development
      FILE_UPLOAD_DIR: /app/uploads
    volumes:
      - ./api:/app
      - ./uploads:/app/uploads
    ports:
      - "4000:4000"
  web:
    build: ./web
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    ports:
      - "5173:5173"
volumes:
  pgdata: